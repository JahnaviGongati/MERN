<html>
<head>
<title>Input Methods</title>
</head>
<body>
<h2>
Different ways of taking inputs</h2>
<script>
//1.using prompt()
let name=prompt("Enter name:");
document.write("Student name:"+name+"<br>");
let age=prompt("Enter age:");
if(age>=18)
document.write("age:"+ age+"is eligible"+"<br>");
else
document.write("age:"+ age+"is noteligible"+"<br>");
</script>
</head>
</html>
